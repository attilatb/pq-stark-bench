name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  copy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Enforce positioning and style rules
        run: |
          files=$(git ls-files 'docs/*.md' 'site/src/**' 'README.md' \
            | grep -v 'KICKOFF-v1-superseded' | grep -v '^docs/research/' || true)
          if [ -z "$files" ]; then exit 0; fi
          fail=0
          if grep -lP '\x{2014}' $files 2>/dev/null; then
            echo "FAIL: em dash found. House style is hyphens only."
            fail=1
          fi
          for phrase in "world's first" "first ever" "quantum-proof" "unbreakable"; do
            if grep -ril "$phrase" $files 2>/dev/null; then
              echo "FAIL: banned phrase '$phrase'."
              fail=1
            fi
          done
          exit $fail

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci --prefix site || npm install --prefix site
      - run: npm run build --prefix site
