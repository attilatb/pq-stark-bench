name: deploy-site

# Builds the dashboard and deploys it to Netlify on every push to main.
#
# Requires two repository secrets:
#   NETLIFY_AUTH_TOKEN  a Netlify personal access token
#   NETLIFY_SITE_ID     722757e3-e617-459a-8533-04ff8f565c45
#
# If instead the Netlify project is connected directly to this GitHub repo
# through Netlify's own git integration, this workflow is redundant and can be
# deleted. Do not run both, or every push deploys twice.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install site dependencies
        run: npm install --prefix site

      - name: Build site
        # collect-results.mjs reads ../results, so the full checkout matters.
        run: npm run build --prefix site

      - name: Fail if the build produced no results payload
        run: |
          test -s site/src/generated/results.json
          node -e "
            const p = require('./site/src/generated/results.json');
            const n = (p.native||[]).length, z = (p.zkvm||[]).length;
            console.log('native runs:', n, 'zkvm runs:', z);
            if (n === 0 && z === 0) {
              console.error('No results collected. Refusing to deploy an empty dashboard.');
              process.exit(1);
            }
          "

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Netlify secrets are not configured. Skipping deploy."
            echo "Set NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID, or connect the"
            echo "repository directly in Netlify and delete this workflow."
            exit 0
          fi
          npx --yes netlify-cli@26 deploy \
            --dir site/dist \
            --site "$NETLIFY_SITE_ID" \
            --prod \
            --message "${GITHUB_SHA::7} via GitHub Actions"
